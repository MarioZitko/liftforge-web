name: Deploy Web

on:
  push:
    branches: [main, uat, test]

# Only one deployment per environment at a time
concurrency:
  group: deploy-web-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy (${{ github.ref_name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    environment: ${{ github.ref_name == 'main' && 'production' || github.ref_name }}

    steps:
      # ── 1. Resolve environment metadata ──────────────────────────────────────
      - name: Set deploy environment
        id: env
        run: |
          case "${{ github.ref_name }}" in
            main)
              echo "ENV=prod"                                             >> $GITHUB_OUTPUT
              echo "COMPOSE_FILE=docker-compose.prod.yml"                >> $GITHUB_OUTPUT
              echo "VITE_API_BASE_URL=https://api.liftforge.xyz"         >> $GITHUB_OUTPUT
              ;;
            uat)
              echo "ENV=uat"                                              >> $GITHUB_OUTPUT
              echo "COMPOSE_FILE=docker-compose.uat.yml"                 >> $GITHUB_OUTPUT
              echo "VITE_API_BASE_URL=https://api.uat.liftforge.xyz"     >> $GITHUB_OUTPUT
              ;;
            test)
              echo "ENV=test"                                             >> $GITHUB_OUTPUT
              echo "COMPOSE_FILE=docker-compose.test.yml"                >> $GITHUB_OUTPUT
              echo "VITE_API_BASE_URL=https://api.test.liftforge.xyz"    >> $GITHUB_OUTPUT
              ;;
          esac
          echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # ── 2. Checkout source ───────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 3. Build Web image (with env-specific VITE_API_BASE_URL) and push ───
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Web image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VITE_API_BASE_URL=${{ steps.env.outputs.VITE_API_BASE_URL }}
          tags: |
            ghcr.io/${{ steps.env.outputs.IMAGE_OWNER }}/liftforge-web:${{ steps.env.outputs.ENV }}
            ghcr.io/${{ steps.env.outputs.IMAGE_OWNER }}/liftforge-web:${{ github.sha }}
          cache-from: type=gha,scope=${{ github.ref_name }}-web
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-web

      # ── 4. Deploy to VPS ─────────────────────────────────────────────────────
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            # Compose files live in the API repo
            cd /opt/liftforge/liftforge-api

            echo "▶ Pulling new Web image..."
            docker compose -f ${{ steps.env.outputs.COMPOSE_FILE }} pull web

            echo "▶ Restarting Web container..."
            docker compose -f ${{ steps.env.outputs.COMPOSE_FILE }} up -d --no-deps web

            echo "▶ Verifying container is running..."
            sleep 3
            docker compose -f ${{ steps.env.outputs.COMPOSE_FILE }} ps web

            echo "✅ Web deployed to ${{ steps.env.outputs.ENV }}"
